<div class="container-main section-padding">
    <div class="mb-12">
        <h1 class="text-4xl font-bold text-text-main mb-4">My Dashboard</h1>
        <p class="text-xl text-text-muted max-w-2xl">
            Welcome back, {{ (currentUser$ | async)?.display_name || 'Guest' }}. Here are your marked talks.
        </p>
    </div>

    <ng-container *ngIf="rsvps$ | async as seminars">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" *ngIf="seminars.length > 0; else emptyState">
            <app-seminar-card *ngFor="let seminar of seminars" [seminar]="seminar"></app-seminar-card>
        </div>

        <ng-template #emptyState>
            <div
                class="card p-16 text-center bg-surface-muted/50 border-dashed border-2 border-border flex flex-col items-center justify-center">
                <div class="w-20 h-20 bg-surface rounded-full flex items-center justify-center shadow-premium mb-6">
                    <svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                        </path>
                    </svg>
                </div>
                <h3 class="text-2xl font-bold text-heading mb-3">Your schedule is empty</h3>
                <p class="text-text-muted mb-8 max-w-sm mx-auto">You haven't marked yourself as attending any upcoming
                    talks yet. Start exploring the latest seminars!</p>
                <a routerLink="/schedule" class="btn btn-primary">
                    Browse Upcoming Talks
                </a>
            </div>
        </ng-template>
    </ng-container>
</div>
