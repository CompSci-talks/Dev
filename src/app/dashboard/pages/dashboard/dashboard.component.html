<div class="max-w-7xl mx-auto px-4 py-12">
    <div class="mb-12">
        <h1 class="text-4xl font-bold text-text-main mb-4">My Dashboard</h1>
        <p class="text-xl text-text-muted max-w-2xl">
            Welcome back, {{ (currentUser$ | async)?.display_name || 'Guest' }}. Here are your upcoming reservations.
        </p>
    </div>

    <ng-container *ngIf="rsvps$ | async as seminars">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" *ngIf="seminars.length > 0; else emptyState">
            <app-seminar-card *ngFor="let seminar of seminars" [seminar]="seminar"></app-seminar-card>
        </div>

        <ng-template #emptyState>
            <div class="card p-12 text-center bg-surface-muted border-dashed border-2 border-border">
                <svg class="w-16 h-16 mx-auto text-text-muted mb-4" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                    </path>
                </svg>
                <h3 class="text-2xl font-bold mb-2">No Upcoming RSVPs</h3>
                <p class="text-text-muted mb-6">You haven't marked yourself as attending any upcoming seminars yet.</p>
                <a routerLink="/" class="btn btn-primary inline-flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    Browse Schedule
                </a>
            </div>
        </ng-template>
    </ng-container>
</div>
