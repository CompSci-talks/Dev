<div class="max-w-6xl mx-auto px-4 py-8 animate-fade-in">

  <!-- Breadcrumb & Title Section -->
  <div class="flex flex-col gap-2 mb-8">
    <button (click)="goBack()"
      class="group flex items-center gap-2 text-sm font-bold text-text-muted hover:text-primary transition-all w-fit">
      <span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
      Back
    </button>
    <div class="flex items-end justify-between">
      <div>
        <h1 class="text-4xl font-extrabold text-text-main tracking-tight leading-none">Compose Message</h1>
        <p class="text-text-muted mt-2">Create a professional response or announcement.</p>
      </div>
    </div>
  </div>

  <div class="bg-surface border border-border rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden flex flex-col">
    <form [formGroup]="emailForm" (ngSubmit)="sendEmail()" class="flex flex-col">

      <!-- Composer Header: Recipients & Subject -->
      <div class="bg-surface-muted/30 border-b border-border p-2 sm:p-4 space-y-1">

        <!-- Recipient Row -->
        <div
          class="flex flex-col sm:flex-row sm:items-center gap-4 px-4 py-3 group hover:bg-surface-muted/50 rounded-2xl transition-all">
          <label
            class="text-[10px] uppercase tracking-widest font-black text-text-faint w-16 shrink-0">Recipient</label>
          <div class="flex flex-wrap gap-2 items-center flex-1">
            <!-- Summary Badge -->
            <div
              class="flex items-center gap-2 bg-primary/10 text-primary px-3 py-1.5 rounded-xl text-xs font-bold border border-primary/20 shadow-sm">
              <span class="material-symbols-outlined text-sm">group</span>
              {{ selectedRecipients.length }} Selected
            </div>

            <!-- Individual Chips -->
            <div class="flex flex-wrap gap-2 max-h-32 overflow-y-auto w-full pt-1">
              <div *ngFor="let user of selectedRecipients"
                class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold bg-surface border border-border shadow-sm text-text-main hover:border-primary/30 transition-all">
                <span class="truncate max-w-[150px]">{{ user.display_name || user.email }}</span>
                <button type="button" (click)="removeRecipient(user.id)"
                  class="text-text-muted hover:text-status-error transition-all p-0.5 hover:bg-status-error/5 rounded">
                  <span class="material-symbols-outlined text-sm font-bold">close</span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Subject Row -->
        <div
          class="flex flex-col sm:flex-row sm:items-center gap-4 px-4 py-3 group hover:bg-surface-muted/50 rounded-2xl transition-all">
          <label for="subject"
            class="text-[10px] uppercase tracking-widest font-black text-text-faint w-16 shrink-0">Subject</label>
          <input id="subject" type="text" formControlName="subject"
            class="flex-1 bg-transparent border-0 focus:ring-0 text-xl font-bold text-text-main placeholder:text-text-faint/50 placeholder:font-normal transition-all outline-none"
            placeholder="Give your message a meaningful subject...">
        </div>
      </div>

      <!-- Main Editor Area -->
      <div class="flex-1 flex flex-col min-h-[500px]">
        <quill-editor formControlName="body" class="flex-1 w-full flex flex-col" theme="snow" [modules]="quillModules"
          placeholder="Start typing your message here...">
        </quill-editor>
      </div>

      <!-- Action Footer -->
      <div
        class="p-8 bg-surface-muted/50 border-t border-border flex flex-col sm:flex-row items-center justify-between gap-6">
        <div class="text-xs text-text-muted font-medium flex items-center gap-2">
          <!-- <span class="material-symbols-outlined text-sm">info</span>
          Changes are saved locally as you type. -->
        </div>

        <div class="flex items-center gap-4 w-full sm:w-auto">
          <button type="button" (click)="goBack()"
            class="flex-1 sm:flex-none px-8 py-3.5 rounded-2xl font-bold text-text-muted hover:bg-surface border border-transparent hover:border-border transition-all active:scale-95"
            [disabled]="isSending">
            Discard
          </button>
          <button type="submit"
            class="flex-1 sm:flex-none bg-primary hover:bg-primary-hover text-white font-bold py-3.5 px-10 rounded-2xl shadow-xl shadow-primary/20 
                       transition-all transform hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:transform-none flex items-center justify-center gap-3"
            [disabled]="emailForm.invalid || selectedRecipients.length === 0 || isSending">
            <span *ngIf="!isSending" class="material-symbols-outlined text-lg">send</span>
            <div *ngIf="isSending" class="animate-spin rounded-full h-5 w-5 border-2 border-white/30 border-t-white">
            </div>
            {{ isSending ? 'Sending Message...' : 'Send Message' }}
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
