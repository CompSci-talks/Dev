<div class="w-full bg-gallery-surface min-h-screen">
    <!-- Top Section: Title & High-level Filters -->
    <div class="px-8 pt-8 pb-4 space-y-6">
        <div class="flex items-end justify-between">
            <div>
                <h2 class="text-4xl font-bold text-gallery-on-surface tracking-tight leading-none">Contact Us
                    submissions
                </h2>
                <p class="text-gallery-on-surface-variant mt-2 max-w-lg"></p>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs font-bold uppercase tracking-widest text-gallery-outline">Show:</span>
                <div class="flex gap-2 p-1 bg-gallery-surface-container rounded-xl">
                    <button (click)="setStatusFilter('all')"
                        [ngClass]="currentStatus === 'all' ? 'bg-gallery-surface-container-lowest shadow-sm text-gallery-primary' : 'text-gallery-on-surface-variant hover:bg-gallery-surface-container-low'"
                        class="px-4 py-2 text-xs font-semibold rounded-lg transition-all">All Inquiries</button>
                    <button (click)="setStatusFilter('new')"
                        [ngClass]="currentStatus === 'new' ? 'bg-gallery-surface-container-lowest shadow-sm text-gallery-primary' : 'text-gallery-on-surface-variant hover:bg-gallery-surface-container-low'"
                        class="px-4 py-2 text-xs font-semibold rounded-lg transition-all">Unread</button>
                    <button (click)="setStatusFilter('resolved')"
                        [ngClass]="currentStatus === 'resolved' ? 'bg-gallery-surface-container-lowest shadow-sm text-gallery-primary' : 'text-gallery-on-surface-variant hover:bg-gallery-surface-container-low'"
                        class="px-4 py-2 text-xs font-semibold rounded-lg transition-all">Resolved</button>
                </div>
            </div>
        </div>

        <!-- Category Filters -->
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="text-xs font-bold uppercase tracking-widest text-gallery-outline">Filter By:</span>

                <!-- Multiselect Category Trigger -->
                <div class="relative group">
                    <button
                        class="flex items-center gap-3 px-4 py-2.5 bg-gallery-surface-container-low border border-gallery-outline-variant/30 rounded-xl hover:bg-gallery-surface-container transition-all shadow-sm"
                        [title]="getFullSubjectList()">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-gallery-primary text-xl">filter_list</span>
                            <span class="text-sm font-semibold text-gallery-on-surface">{{ getSubjectSummary() }}</span>
                        </div>
                        <span
                            class="material-symbols-outlined text-gallery-outline text-lg group-hover:rotate-180 transition-transform">expand_more</span>
                    </button>

                    <!-- Dropdown Menu (on hover for now, or click) -->
                    <div
                        class="absolute left-0 mt-2 w-64 bg-gallery-surface-container-lowest border border-gallery-outline-variant/30 rounded-2xl shadow-xl z-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 py-3">
                        <div class="px-4 py-2 border-b border-gallery-outline-variant/10 mb-2">
                            <h3 class="text-[10px] font-bold uppercase tracking-wider text-gallery-outline">Select
                                Categories</h3>
                        </div>
                        <div class="space-y-1 px-2">
                            <button *ngFor="let subject of availableSubjects" (click)="toggleSubject(subject)"
                                class="w-full flex items-center justify-between px-3 py-2 rounded-xl text-sm transition-colors"
                                [ngClass]="currentSubjects.includes(subject) ? 'bg-gallery-primary/5 text-gallery-primary' : 'text-gallery-on-surface-variant hover:bg-gallery-surface-container-low'">
                                <span>{{ subject }}</span>
                                <span *ngIf="currentSubjects.includes(subject)"
                                    class="material-symbols-outlined text-sm font-bold">check</span>
                            </button>
                        </div>
                        <div class="mt-3 px-4 pt-3 border-t border-gallery-outline-variant/10 flex flex-col gap-2">
                            <div class="flex justify-between">
                                <button (click)="toggleSubject('all_selected')"
                                    class="text-[10px] font-bold uppercase text-gallery-primary hover:underline">Select
                                    All</button>
                                <button (click)="toggleSubject('none')"
                                    class="text-[10px] font-bold uppercase text-gallery-outline hover:text-gallery-primary transition-colors">Clear</button>
                            </div>
                            <button (click)="resetFilters()"
                                class="w-full mt-2 py-2 bg-gallery-primary/10 text-gallery-primary text-[10px] font-bold uppercase rounded-lg hover:bg-gallery-primary/20 transition-colors">Reset
                                All Filters</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Active Chips (Optional, but let's keep it clean as per user request summary) -->
            <div class="flex flex-wrap gap-2">
                <div *ngFor="let s of currentSubjects.slice(0, 2)"
                    class="px-3 py-1 bg-gallery-secondary-container text-gallery-on-secondary-container rounded-full text-[10px] font-bold uppercase tracking-tight">
                    {{ s }}
                </div>
                <div *ngIf="currentSubjects.length > 2" [title]="getFullSubjectList()"
                    class="px-3 py-1 bg-gallery-surface-container-high text-gallery-on-surface-variant rounded-full text-[10px] font-bold cursor-help">
                    +{{ currentSubjects.length - 2 }} More
                </div>
            </div>
        </div>
    </div>

    <!-- Content Area -->
    <div class="px-8 pb-12">
        <div *ngIf="submissions$ | async as submissions; else loading">
            <app-feedback-list-ui *ngIf="submissions.length > 0; else emptyState" [submissions]="submissions"
                (view)="onView($event)" (delete)="onDelete($event)" (reply)="onReply($event)">
            </app-feedback-list-ui>

            <ng-template #emptyState>
                <div
                    class="p-20 text-center bg-gallery-surface-container-low rounded-2xl border-2 border-dashed border-gallery-outline-variant/30">
                    <span class="material-symbols-outlined text-6xl text-gallery-outline-variant/50 mb-4">inbox</span>
                    <p class="text-xl font-bold text-gallery-on-surface">No feedback to show</p>
                    <p class="text-sm text-gallery-on-surface-variant opacity-70">New submissions will appear here for
                        moderation.</p>
                </div>
            </ng-template>
        </div>

        <ng-template #loading>
            <div class="flex flex-col justify-center items-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-gallery-primary mb-4">
                </div>
                <span class="text-xs font-bold text-gallery-on-surface-variant uppercase tracking-widest">Fetching
                    Submissions...</span>
            </div>
        </ng-template>
    </div>

    <!-- Detail Modal (Dumb Component) -->
    <app-feedback-detail-ui [isOpen]="isSlideOverOpen" [data]="selectedSubmission" (close)="closeDetail()"
        (reply)="onReply($event)" (delete)="onDelete($event)"
        (statusChange)="onStatusChange($event.submission, $event.status)">
    </app-feedback-detail-ui>
</div>
