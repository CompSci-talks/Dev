<div class="max-w-5xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-text-main mb-2">Upcoming Seminars</h1>
            <p class="text-text-muted">Discover and RSVP to the latest talks from our community.</p>
        </div>
        <a routerLink="/archive" class="btn btn-outline">View Previous Talks</a>
    </div>

    <app-paginated-grid [data]="seminars" [loading]="loading" [itemTemplate]="seminarTmpl"
        [skeletonTemplate]="skeletonTmpl" emptyMessage="No upcoming seminars found. Check back later!"
        [showPagination]="false">
        <ng-template #seminarTmpl let-sem>
            <app-seminar-card [seminar]="sem"></app-seminar-card>
        </ng-template>

        <ng-template #skeletonTmpl>
            <app-skeleton-card *ngFor="let i of [1,2,3,4,5,6]"></app-skeleton-card>
        </ng-template>
    </app-paginated-grid>
</div>
