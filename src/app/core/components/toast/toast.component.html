<div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
    <div *ngFor="let toast of toasts"
        class="pointer-events-auto shadow-lg rounded-lg p-4 min-w-[300px] flex justify-between items-start animate-fade-in"
        [ngClass]="{
         'bg-status-success text-white': toast.type === 'success',
         'bg-status-error text-white': toast.type === 'error',
         'bg-surface-card text-text-main border border-border': toast.type === 'info'
       }">
        <span>{{ toast.message }}</span>
        <button (click)="remove(toast)" class="text-white/80 hover:text-white ml-4 focus:outline-none">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
</div>
