<div class="fixed top-6 right-6 z-[70] flex flex-col gap-3 pointer-events-none max-w-[calc(100vw-3rem)] sm:max-w-md">
    <div *ngFor="let toast of toasts$ | async" role="alert" aria-live="polite"
        class="pointer-events-auto flex items-center gap-3 p-4 rounded-xl shadow-xl border backdrop-blur-md transition-all duration-300 transform animate-in fade-in"
        [ngClass]="{
          'bg-emerald-500/70 text-white border-white/20': toast.type === 'success',
          'bg-red-500/70 text-white border-white/20': toast.type === 'error',
          'bg-amber-500/70 text-white border-white/20': toast.type === 'warning',
          'bg-white/70 text-slate-900 border-white/20': toast.type === 'info'
        }">

        <!-- Icons -->
        <div class="flex-shrink-0">
            <svg *ngIf="toast.type === 'success'" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
            </svg>
            <svg *ngIf="toast.type === 'error'" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <svg *ngIf="toast.type === 'warning'" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <svg *ngIf="toast.type === 'info'" class="w-6 h-6 text-primary" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <div class="flex-grow">
            <p class="text-sm font-semibold leading-5">{{ toast.message }}</p>
        </div>

        <button (click)="remove(toast)"
            class="flex-shrink-0 rounded-lg p-1 transition-colors hover:bg-black/10 focus:outline-none focus:ring-2 focus:ring-black/5"
            [attr.aria-label]="'Dismiss ' + toast.type + ' message'">
            <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
</div>
