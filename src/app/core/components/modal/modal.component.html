<div class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4"
    (click)="onBackdropClick($event)">
    <div class="modal-panel bg-surface border border-border rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">

        <!-- Header -->
        <div class="flex items-start justify-between p-6 border-b border-border">
            <div>
                <h2 class="text-lg font-bold text-text-main">{{ title }}</h2>
                <p *ngIf="subtitle" class="text-sm text-text-muted mt-0.5">{{ subtitle }}</p>
            </div>
            <button (click)="close.emit()"
                class="p-1.5 rounded-lg text-text-muted hover:text-text-main hover:bg-surface-muted transition-colors -mt-0.5 -mr-0.5 ml-4 flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18" />
                    <path d="m6 6 12 12" />
                </svg>
            </button>
        </div>

        <!-- Body -->
        <div class="p-6">
            <ng-content select="[body]"></ng-content>
        </div>

        <!-- Footer -->
        <div class="px-6 pb-6">
            <ng-content select="[footer]"></ng-content>
        </div>

    </div>
</div>
