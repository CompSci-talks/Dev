<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-text-main">Welcome Back</h1>
            <p class="text-text-muted mt-2">Sign in to access seminar materials and RSVP.</p>
        </div>

        <div *ngIf="errorMessage"
            class="bg-status-error/10 text-status-error p-3 rounded-md mb-6 text-sm border border-status-error/20">
            {{ errorMessage }}
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-text-main mb-1">Email</label>
                <input type="email" id="email" name="email" [(ngModel)]="email" required class="input-field"
                    placeholder="you@example.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-text-main mb-1">Password</label>
                <input type="password" id="password" name="password" [(ngModel)]="password" required class="input-field"
                    placeholder="••••••••">
                <p class="text-xs text-text-muted mt-1">Hint: use 'password' for the mock database</p>
            </div>

            <button type="submit" class="btn btn-primary w-full mt-6" [disabled]="!loginForm.valid || isLoading">
                <span *ngIf="isLoading">Signing in...</span>
                <span *ngIf="!isLoading">Sign In</span>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-text-muted">
            Don't have an account? <a routerLink="/register"
                class="text-primary hover:text-primary-hover hover:underline font-medium">Sign up</a>
        </div>
    </div>
</div>
