<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-text-main">Welcome Back</h1>
        </div>

        <div *ngIf="errorMessage"
            class="bg-status-error/10 text-status-error p-3 rounded-md mb-6 text-sm border border-status-error/20">
            {{ errorMessage }}
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-text-main mb-1">Email</label>
                <input type="email" id="email" name="email" [(ngModel)]="email" required class="input-field"
                    placeholder="you@example.com">
            </div>

            <div>
                <div class="flex items-center justify-between mb-1">
                    <label for="password" class="block text-sm font-medium text-text-main">Password</label>
                    <a routerLink="/forgot-password" class="text-xs text-primary hover:underline">Forgot password?</a>
                </div>
                <app-password-input inputId="password" [(ngModel)]="password" name="password" required>
                </app-password-input>
            </div>

            <button type="submit" class="btn btn-primary w-full mt-6" [disabled]="!loginForm.valid || isDisabled">
                {{ buttonLabel }}
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-text-muted">
                Don't have an account?
                <a routerLink="/register"
                    class="text-primary hover:text-primary-hover font-semibold transition-colors">Sign up</a>
            </p>
        </div>
    </div>
</div>
