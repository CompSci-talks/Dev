<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-text-main">Create an Account</h1>
        </div>

        <div *ngIf="errorMessage"
            class="bg-status-error/10 text-status-error p-3 rounded-md mb-6 text-sm border border-status-error/20">
            {{ errorMessage }}
        </div>

        <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="space-y-4">
            <div>
                <label for="displayName" class="block text-sm font-medium text-text-main mb-1">Display Name</label>
                <input type="text" id="displayName" name="displayName" [(ngModel)]="displayName" required
                    class="input-field" placeholder="Your Name">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-text-main mb-1">Email</label>
                <input type="email" id="email" name="email" [(ngModel)]="email" required class="input-field"
                    placeholder="you@example.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-text-main mb-1">Password</label>
                <app-password-input inputId="password" [(ngModel)]="password" name="password" required minlength="6">
                </app-password-input>
                @if (password && confirmPassword && password !== confirmPassword) {
                <div class="text-status-error text-sm mt-1">
                    Passwords do not match
                </div>
                }
            </div>
            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-text-main mb-1">Confirm
                    Password</label>
                <app-password-input inputId="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword"
                    required minlength="6">
                </app-password-input>
            </div>

            <button type="submit" class="btn btn-primary w-full mt-6"
                [disabled]="!registerForm.valid || isLoading || password !== confirmPassword">
                <span *ngIf="isLoading">Creating account...</span>
                <span *ngIf="!isLoading">Sign Up</span>
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-text-muted">
                Already have an account?
                <a routerLink="/login" class="text-primary hover:text-primary-hover font-semibold transition-colors">Log
                    in</a>
            </p>
        </div>
    </div>
</div>
