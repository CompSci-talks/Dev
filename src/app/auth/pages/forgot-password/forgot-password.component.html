<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="card w-full max-w-md p-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-text-main">Reset Password</h1>
            <p class="text-sm text-text-muted mt-2">
                Enter your email address and we'll send you a link to reset your password.
            </p>
        </div>

        <div *ngIf="isSent" class="bg-primary/10 text-primary p-6 rounded-xl border border-primary/20 text-center mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <h2 class="font-bold mb-2">Check your inbox</h2>
            <p class="text-sm">We've sent a password reset link to <span class="font-bold">{{email}}</span>.</p>
        </div>

        <form *ngIf="!isSent" (ngSubmit)="onSubmit()" #forgotForm="ngForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-text-main mb-1">Email</label>
                <input type="email" id="email" name="email" [(ngModel)]="email" required email class="input-field"
                    placeholder="you@example.com">
            </div>

            <button type="submit" class="btn btn-primary w-full mt-6" [disabled]="!forgotForm.valid || isLoading">
                <span class="flex items-center justify-center gap-2">
                    <svg *ngIf="isLoading" class="animate-spin h-4 w-4" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"
                            fill="none"></circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
                </span>
            </button>
        </form>

        <div class="mt-6 text-center">
            <a routerLink="/login"
                class="text-sm text-text-muted hover:text-primary transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to login
            </a>
        </div>
    </div>
</div>
