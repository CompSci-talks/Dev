<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="card w-full max-w-md p-8 animate-in fade-in slide-in-from-bottom-4 duration-500">

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-text-main">
                Set New Password
            </h1>

            <p *ngIf="email" class="text-sm text-text-muted mt-2">
                Resetting password for
                <span class="font-bold text-text-main">{{ email }}</span>
            </p>
        </div>

        <!-- Verifying State -->
        <div *ngIf="isVerifying" class="text-center py-8">
            <svg class="animate-spin h-10 w-10 text-primary mx-auto mb-4" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none">
                </circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <p class="text-text-muted">
                Verifying link...
            </p>
        </div>

        <!-- Form -->
        <form *ngIf="!isVerifying && isValidCode" (ngSubmit)="onSubmit()" #resetForm="ngForm" class="space-y-4">

            <div>
                <label for="newPassword" class="block text-sm font-medium text-text-main mb-1">
                    New Password
                </label>
                <input type="password" id="newPassword" name="newPassword" [(ngModel)]="newPassword" required
                    minlength="6" class="input-field" placeholder="••••••••">
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-text-main mb-1">
                    Confirm New Password
                </label>
                <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword"
                    required class="input-field" placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary w-full mt-6" [disabled]="!resetForm.valid || isLoading">

                <span class="flex items-center justify-center gap-2">
                    <svg *ngIf="isLoading" class="animate-spin h-4 w-4" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"
                            fill="none"></circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>

                    {{ isLoading ? 'Resetting...' : 'Change Password' }}
                </span>
            </button>
        </form>

        <!-- Invalid Link -->
        <div *ngIf="!isVerifying && !isValidCode" class="text-center py-4">
            <div class="bg-status-error/10 text-status-error p-4 rounded-lg border border-status-error/20 mb-6">
                Invalid or expired password reset link.
            </div>

            <a routerLink="/forgot-password" class="btn btn-primary w-full">
                Request new link
            </a>
        </div>

    </div>
</div>
