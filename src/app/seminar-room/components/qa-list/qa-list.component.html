<div class="space-y-4">
    <div *ngIf="isLoading" class="flex justify-center py-8">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
    </div>

    <ng-container *ngIf="!isLoading">
        <div *ngIf="questions.length === 0"
            class="text-center py-8 text-text-muted italic border border-dashed border-border rounded-lg bg-surface-muted">
            No questions yet. Be the first to ask!
        </div>

        <div *ngFor="let q of questions"
            class="bg-surface-card border border-border rounded-lg p-4 shadow-sm animate-fade-in text-left">
            <!-- We don't have display names loaded into the question model directly unless joined, using placeholder or email split -->
            <div class="flex justify-between items-start mb-2">
                <span class="font-medium text-sm text-primary">Attendee</span>
                <span class="text-xs text-text-muted">{{ q.created_at | date:'shortTime' }}</span>
            </div>
            <p class="text-text-main whitespace-pre-line text-sm">{{ q.content }}</p>
        </div>
    </ng-container>
</div>
