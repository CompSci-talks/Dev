<div class="space-y-4">
    <div *ngIf="isLoading" class="flex justify-center py-8">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
    </div>

    <ng-container *ngIf="!isLoading">
        <div *ngIf="comments.length === 0"
            class="text-center py-8 text-text-muted italic border border-dashed border-border rounded-lg bg-surface-muted">
            No comments yet. Be the first to start the discussion!
        </div>

        <div *ngFor="let c of topLevelComments" class="flex flex-col gap-3">
            <!-- Parent Comment -->
            <div class="bg-surface-card border border-border rounded-lg p-4 shadow-sm animate-fade-in text-left">
                <div class="flex justify-between items-start mb-2">
                    <span class="font-medium text-sm text-primary">Attendee</span>
                    <span class="text-xs text-text-muted">{{ c.created_at | date:'shortTime' }}</span>
                </div>
                <p class="text-text-main whitespace-pre-line text-sm mb-3">{{ c.text }}</p>
                <div class="flex justify-end">
                    <button class="text-xs font-semibold text-text-muted hover:text-primary transition-colors"
                        (click)="replyClicked.emit(c.id)">
                        Reply
                    </button>
                </div>
            </div>

            <!-- Inline Reply Form -->
            <div *ngIf="activeReplyId === c.id" class="ms-8 mb-4 animate-fade-in">
                <app-comment-form [isReply]="true" [parentId]="c.id" (cancelReply)="replyClicked.emit(null)"
                    (submitComment)="replySubmitted.emit($event)">
                </app-comment-form>
            </div>

            <!-- Nested Replies (1 level deep) -->
            <div *ngIf="getReplies(c.id).length > 0" class="flex flex-col gap-3 ms-8">
                <div *ngFor="let reply of getReplies(c.id)"
                    class="bg-surface-muted border-l-2 border-primary rounded-r-lg p-3 shadow-sm animate-fade-in text-left">
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-medium text-sm text-primary">Attendee</span>
                        <span class="text-xs text-text-muted">{{ reply.created_at | date:'shortTime' }}</span>
                    </div>
                    <p class="text-text-main whitespace-pre-line text-sm">{{ reply.text }}</p>
                </div>
            </div>
        </div>
    </ng-container>
</div>
