<div class="space-y-4">
    <div *ngIf="isLoading" class="flex justify-center py-8">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
    </div>

    <ng-container *ngIf="!isLoading">
        <div *ngIf="comments.length === 0"
            class="text-center py-8 text-text-muted italic border border-dashed border-border rounded-lg bg-surface-muted">
            No comments yet. Be the first to start the discussion!
        </div>

        <div *ngFor="let c of displayComments" class="flex flex-col gap-3" [class.ms-8]="isReply">
            <!-- Comment Card -->
            <div class="bg-surface-card border border-border rounded-lg p-4 shadow-sm animate-fade-in text-left"
                [class.bg-surface-muted]="isReply" [class.border-l-2]="isReply" [class.border-primary]="isReply">
                <div class="flex justify-between items-center mb-1">
                    <span class="font-medium text-sm text-primary">{{ c.author_name }}</span>
                    <span class="text-xs text-text-muted">{{ c.created_at | date:'shortTime' }}</span>
                </div>
                <p class="text-text-main whitespace-pre-line text-sm mb-3 transition-all"
                    [class.line-clamp-3]="!isExpanded(c.id)">
                    {{ c.text }}
                </p>
                <div class="flex justify-between items-center">
                    <button *ngIf="c.text.length > 300" (click)="toggleExpand(c.id)"
                        class="text-xs text-primary hover:underline font-medium">
                        {{ isExpanded(c.id) ? 'See less' : 'See more' }}
                    </button>
                    <div class="flex-grow"></div>
                    <button *ngIf="!isReply && isAuthenticated"
                        class="text-xs font-semibold text-text-muted hover:text-primary transition-colors"
                        (click)="replyClicked.emit(c.id)">
                        Reply
                    </button>
                </div>
            </div>

            <!-- Inline Reply Form -->
            <div *ngIf="activeReplyId === c.id" class="ms-8 mb-4 animate-fade-in">
                <app-comment-form [isReply]="true" [parentId]="c.id" (cancelReply)="replyClicked.emit(null)"
                    (submitComment)="replySubmitted.emit($event)">
                </app-comment-form>
            </div>

            <!-- Recursive Nested Replies -->
            <div *ngIf="getReplies(c.id).length > 0">
                <app-comment-list [comments]="getReplies(c.id)" [isReply]="true" [activeReplyId]="activeReplyId"
                    [isAuthenticated]="isAuthenticated" (replyClicked)="replyClicked.emit($event)"
                    (replySubmitted)="replySubmitted.emit($event)">
                </app-comment-list>
            </div>
        </div>
    </ng-container>
</div>
