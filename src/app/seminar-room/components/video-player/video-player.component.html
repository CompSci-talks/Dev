<div
    class="video-container relative w-full overflow-hidden pt-[56.25%] bg-black rounded-lg shadow-md border border-border">
    <iframe [src]="embedUrl | safeUrl" class="absolute top-0 left-0 w-full h-full border-0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>
</div>
