<div class="comments-container bg-surface-base rounded-xl border border-border overflow-hidden">
    <div class="p-4 border-b border-border bg-surface-muted flex justify-between items-center">
        <h3 class="text-xl font-bold flex items-center gap-2">
            <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                </path>
            </svg>
            Discussion & Comments
        </h3>
    </div>

    <!-- Scrollable List Area -->
    <div class="p-4 h-96 overflow-y-auto">
        <app-comment-list [comments]="(comments$ | async) || []" [isLoading]="isLoadingComments"
            [activeReplyId]="activeReplyId" [isAuthenticated]="(isAuthenticated$ | async) || false"
            (replyClicked)="onReplyInitiated($event)" (replySubmitted)="onCommentSubmitted($event)">
        </app-comment-list>
    </div>

    <!-- Footer / Submit Area (Top-level comments only) -->
    <div class="p-4 border-t border-border bg-surface-muted">
        <ng-container *ngIf="isAuthenticated$ | async; else guestMessage">
            <app-comment-form [isSubmitting]="isSubmitting" (submitComment)="onCommentSubmitted($event)">
            </app-comment-form>
        </ng-container>

        <ng-template #guestMessage>
            <div class="text-center text-sm py-4">
                <p class="text-text-muted">You must be logged in to leave a comment.</p>
                <a routerLink="/login" class="text-primary hover:underline font-medium mt-1 inline-block">Log in now</a>
            </div>
        </ng-template>
    </div>
</div>
